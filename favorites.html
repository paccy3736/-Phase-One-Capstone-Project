<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Favorites — Book Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#1a1f2e',
            'navy-light': '#232a3b',
            gold: '#06b6d4',
            'gold-hover': '#0891b2',
          },
          fontFamily: {
            serif: ['Georgia', 'Cambria', 'Times New Roman', 'serif'],
          },
        },
      },
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }
    .accent-text   { color: #06b6d4 !important; }
    .accent-bg     { background-color: #06b6d4 !important; }
    .accent-bg:hover { background-color: #0891b2 !important; }
  </style>
</head>
<body class="bg-gray-100 font-sans">

  <!-- NAVBAR -->
  <nav class="bg-navy px-4 py-4 flex items-center justify-between sticky top-0 z-50 shadow-lg">
    <a href="index.html" class="accent-text font-serif text-2xl font-bold tracking-wide">
      Book Explorer
    </a>
    <ul class="hidden md:flex items-center gap-8 text-white text-sm font-medium">
      <li>
        <a href="index.html" class="pb-1 border-b-2 border-transparent hover:text-gold transition-colors duration-200">
          Home
        </a>
      </li>
      <li>
        <a href="favorites.html" class="pb-1 border-b-2 border-white accent-text transition-colors duration-200">
          Favorites
        </a>
      </li>
      <li>
        <a href="about.html" class="pb-1 border-b-2 border-transparent hover:text-gold transition-colors duration-200">
          About
        </a>
      </li>
    </ul>
    <button id="menu-btn" class="md:hidden text-white focus:outline-none" aria-label="Toggle menu">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </nav>

  <div id="mobile-menu" class="hidden bg-navy-light md:hidden px-6 py-4 flex flex-col gap-4">
    <a href="index.html" class="text-white hover:accent-text transition-colors">Home</a>
    <a href="favorites.html" class="accent-text font-semibold">Favorites</a>
    <a href="about.html" class="text-white hover:accent-text transition-colors">About</a>
  </div>

  <!-- PAGE HEADER -->
  <section class="text-white py-16 px-6 text-center" style="background: linear-gradient(135deg, #1e1245 0%, #2d1b69 40%, #4a2080 70%, #1a1f2e 100%);">
    <h1 class="font-serif text-4xl md:text-5xl font-bold mb-3">
      My <span class="accent-text">Favourites</span>
    </h1>
    <p class="text-purple-200 text-base md:text-lg max-w-md mx-auto">
      All the books you've saved in one place.
    </p>
  </section>

  <!-- FAVORITES GRID -->
  <main class="w-full max-w-7xl mx-auto px-4 py-12">

    <div class="flex items-center justify-between mb-8">
      <h2 class="text-2xl font-bold text-gray-800">Saved Books</h2>
      <span id="fav-count" class="text-sm text-gray-500"></span>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20">
      <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
      </svg>
      <p class="text-gray-500 text-lg font-medium">No favourites yet</p>
      <p class="text-gray-400 text-sm mt-1 mb-6">Go browse some books and add them here.</p>
      <a href="index.html" class="accent-bg text-white font-semibold px-6 py-3 rounded-md transition-colors duration-200 text-sm">
        Browse Books
      </a>
    </div>

    <!-- Favorites grid -->
    <div id="favorites-grid" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 w-full"></div>

  </main>

  <footer class="bg-navy text-gray-400 text-center py-6 mt-8">
    <p class="text-sm">
      &copy; 2026 <span class="accent-text font-medium">Book Explorer</span>.
      Built by <span class="text-white font-medium">Pascaline</span>
    </p>
  </footer>

  <script type="module" src="js/favoritesPage.js"></script>

</body>
</html>
